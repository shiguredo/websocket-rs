name: CI

on:
  push:
    paths-ignore:
      - "**.md"
  workflow_dispatch:
  schedule:
    # JST 11:00 (UTC 02:00), 月-金
    - cron: "0 2 * * 1-5"

jobs:
  ci:
    name: CI
    strategy:
      matrix:
        os:
          - ubuntu-24.04
          - ubuntu-24.04-arm
          # windows はテストに時間がかかりすぎるため一時的に除外する
          # - windows-2025
          - macos-26
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    steps:
      - name: Checkout sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - run: rustup update stable
      - uses: shiguredo/github-actions/.github/actions/rust-cache@main
        with:
          os: ${{ matrix.os }}
          toolchain: stable
      - run: cargo fmt --all --check
      # macOS ランナーには Docker がプリインストールされていないため
      # Docker を必要とする e2e テストを含むクレートを除外する
      - run: cargo test --workspace
        if: runner.os != 'macOS'
      - run: cargo test --workspace --exclude websocket_client
        if: runner.os == 'macOS'
      - run: cargo clippy --workspace -- -D warnings

  slack_notify:
    needs: [ci]
    runs-on: ubuntu-slim
    timeout-minutes: 5
    if: ${{ always() }}
    permissions:
      actions: read
    steps:
      - name: Slack Notification
        uses: shiguredo/github-actions/.github/actions/slack-notify@main
        with:
          status: ${{ job.status }}
          slack_webhook: ${{ secrets.SLACK_WEBHOOK }}
          slack_channel: sora-rust-sdk
          notify_mode: failure_and_fixed
