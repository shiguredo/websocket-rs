[package]
name = "shiguredo_websocket"
version = "2026.1.0-canary.2"
edition = "2024"
rust-version = "1.88"
authors = ["Shiguredo Inc."]
license = "Apache-2.0"
description = "WebSocket Library"
homepage = "https://github.com/shiguredo/websocket-rs"
repository = "https://github.com/shiguredo/websocket-rs"
readme = "README.md"

[dependencies]
# https://github.com/marshallpierce/rust-base64
base64 = "0.22"
# https://github.com/RustCrypto/hashes/tree/master/sha1
sha1 = "0.10"
# https://github.com/rust-lang/flate2-rs
flate2 = "1.1"
# https://github.com/shiguredo/http11-rs
shiguredo_http11 = { version = "2026.1.0-canary.0" }

[workspace]
members = [
    "examples/websocket_client",
    "examples/websocket_server",
    "examples/websocket_reverse_proxy",
    "pbt",
]
exclude = [
    "fuzz",
]
